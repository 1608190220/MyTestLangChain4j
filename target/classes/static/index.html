<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangChain Chat - 流式输出演示</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入 Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入数学公式渲染库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🤖 LangChain Chat</h1>
            <p>支持流式输出 | 内置 TimeSkill | CalculatorSkill | PythonMathSkill</p>
        </header>

        <div class="tips">
            <strong>💡 使用提示：</strong>
            试试输入 "现在几点"、"1+2"、"5的阶乘"、"斐波那契第10项" 来测试不同的 Skill！
            <div style="margin-top: 10px;">
                <a href="/embedding.html" style="color:#0d6efd;text-decoration:none;">打开 Embedding 测试页</a>
                <span style="margin:0 8px;color:#9ca3af;">|</span>
                <a href="/chroma-browser.html" style="color:#0d6efd;text-decoration:none;">打开 Chroma 数据查看页</a>
            </div>
        </div>

        <main class="chat-container" id="chatContainer">
            <!-- 消息会在这里显示 -->
        </main>

        <footer class="input-container">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="输入消息..."
                    autocomplete="off"
                >
                <button id="sendBtn" type="button">发送</button>
            </div>
        </footer>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
